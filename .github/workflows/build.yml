name: Build Photobooth installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            dist_script: dist:mac
            artifact_glob: release/*.dmg
          - os: windows-latest
            dist_script: dist:win
            artifact_glob: release/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cai dat Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cai dat dependencies
        run: npm install

      - name: Build ung dung (${{ matrix.os }})
        run: npm run ${{ matrix.dist_script }}

      - name: Dinh kem file cai dat (artifact de tai ve thu cong)
        uses: actions/upload-artifact@v4
        with:
          name: photobooth-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}

      - name: Dinh kem vao GitHub Release (chi khi push tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}